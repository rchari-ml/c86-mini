apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: c8-managed-cert
  namespace: c8-labs-31
spec:
  domains:
    - c8-labs-31.makelabs.in
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: c8-labs-31-ingress
  namespace: c8-labs-31
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.allow-http: "false"  # on ingress, we only allow HTTPS. http is for /zeebe let it be.
    networking.gke.io/managed-certificates: c8-managed-cert
    networking.gke.io/backend-protocol: "HTTP"  # Tell GKE to use HTTP to backend
    cloud.google.com/healthcheck-path: "/console"
spec:
  ingressClassName: "gce"
  rules:
    - host: c8-labs-31.makelabs.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-landing-page-service
                port:
                  number: 80
          - path: /console
            pathType: Prefix
            backend:
              service:
                name: c8-labs-31-console
                port:
                  number: 80
          - path: /operate
            pathType: Prefix
            backend:
              service:
                name: c8-labs-31-operate
                port:
                  number: 80
          - path: /tasklist
            pathType: Prefix
            backend:
              service:
                name: c8-labs-31-tasklist
                port:
                  number: 80
          - path: /optimize
            pathType: Prefix
            backend:
              service:
                name: c8-labs-31-optimize
                port:
                  number: 80
          - path: /auth/
            pathType: Prefix
            backend:
              service:
                name: c8-labs-31-keycloak
                port:
                  number: 80
          - path: /identity
            pathType: Prefix
            backend:
              service:
                name: c8-labs-31-identity
                port:
                  number: 80
          - path: /connectors
            pathType: Prefix
            backend:
              service:
                name: c8-labs-31-connectors
                port:
                  number: 8080
          - path: /zeebe
            pathType: Prefix
            backend:
              service:
                name: c8-labs-31-zeebe-gateway
                port:
                  number: 8080
          - path: /ml-api
            pathType: Prefix
            backend:
              service:
                name: toolkit-service
                port:
                  number: 80
---
# The following is for the identity service
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: identity-backendconfig
  namespace: c8-labs-31
spec:
  healthCheck:
    requestPath: /actuator/health
    port: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: c8-labs-31-identity
  namespace: c8-labs-31
  annotations:
    cloud.google.com/backend-config: '{"default": "identity-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 82
      targetPort: 8082
---
# The following is for the connectors service
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: connectors-backendconfig
  namespace: c8-labs-31
spec:
  healthCheck:
    requestPath: /connectors/actuator/health/readiness
    port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: c8-labs-31-connectors
  namespace: c8-labs-31
  annotations:
    cloud.google.com/backend-config: '{"default": "connectors-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
# The following is for the operate service
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: operate-backendconfig
  namespace: c8-labs-31
spec:
  healthCheck:
    requestPath: /operate/actuator/health/readiness
    port: 9600
---
apiVersion: v1
kind: Service
metadata:
  name: c8-labs-31-operate
  namespace: c8-labs-31
  annotations:
    cloud.google.com/backend-config: '{"default": "operate-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9600
      targetPort: 9600
---
# The following is for the tasklist service
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: tasklist-backendconfig
  namespace: c8-labs-31
spec:
  healthCheck:
    requestPath: /tasklist/actuator/health/readiness
    port: 9600
---
apiVersion: v1
kind: Service
metadata:
  name: c8-labs-31-tasklist
  namespace: c8-labs-31
  annotations:
    cloud.google.com/backend-config: '{"default": "tasklist-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9600
      targetPort: 9600
---
# The following is for the console service
# console readiness -> http://c8-labs-31-console.c8-labs-31:9100/health/readiness
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: console-backendconfig
  namespace: c8-labs-31
spec:
  healthCheck:
    requestPath: /health/readiness
    port: 9100
---
apiVersion: v1
kind: Service
metadata:
  name: c8-labs-31-console
  namespace: c8-labs-31
  annotations:
    cloud.google.com/backend-config: '{"default": "console-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9100
      targetPort: 9100

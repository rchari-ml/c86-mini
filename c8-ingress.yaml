# The following is for the console service
# console readiness -> http://c8-labs-32-console.c8-labs-32:9100/health/readiness
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: console-backendconfig
  namespace: c8-labs-32
spec:
  healthCheck:
    requestPath: /health/readiness
    port: 9100
---
apiVersion: v1
kind: Service
metadata:
  name: c8-labs-32-console
  namespace: c8-labs-32
  annotations:
    cloud.google.com/backend-config: '{"default": "console-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9100
      targetPort: 9100
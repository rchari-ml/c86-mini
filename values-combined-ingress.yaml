zeebeGateway:
  image:
    pullSecrets:
      - name: registry-docker-hub
  contextPath: "/zeebe"
  env:
      # section starts
      # ref v8.7 -> (1) https://docs.camunda.io/docs/self-managed/zeebe-deployment/security/secure-cluster-communication/
      #             (2) https://docs.camunda.io/docs/self-managed/zeebe-deployment/configuration/gateway-config/
      ##                Using the "configuration" block to seed the values "application.yaml". 
      ##                Commented env section.
    #- name: ZEEBE_GATEWAY_CLUSTER_SECURITY_ENABLED
    #  value: "true"
    #- name: ZEEBE_GATEWAY_CLUSTER_SECURITY_CERTIFICATECHAINPATH
    #  value: "/usr/local/zeebe/certs/tls.crt"
    #- name: ZEEBE_GATEWAY_CLUSTER_SECURITY_PRIVATEKEYPATH
    #  value: "/usr/local/zeebe/certs/tls.key"
      # section ends
    #- name: ZEEBE_BROKER_GATEWAY_SECURITY_ENABLED
    #  value: "true"
    #- name: ZEEBE_BROKER_GATEWAY_SECURITY_CERTIFICATECHAINPATH
    #  value: "/usr/local/zeebe/certs/tls.crt"
    #- name: ZEEBE_BROKER_GATEWAY_SECURITY_PRIVATEKEYPATH
    #  value: "/usr/local/zeebe/certs/tls.key"
    - name: ZEEBE_GATEWAY_SECURITY_AUTHENTICATION_MODE
      value: "none" # or "identity"
  ingress:
    grpc:
      enabled: false
      className: nginx
      host: "${UNAMESPACE}-zeebe-gateway.makelabs.in"
      tls:
        enabled: true
        secretName: ${UNAMESPACE}-zeebe-grpc-tls
    rest:
      enabled: false
      className: nginx
      host: "${UNAMESPACE}.makelabs.in"
      path: "/zeebe"
      tls:
        enabled: true
        secretName: ${UNAMESPACE}-zeebe-rest-tls
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "400m"
  #security:
  #  enabled: false  # true, to make it apply TLS. Also, provide cert and private key as per below.
    #certChainPath: /usr/local/zeebe/certs/tls.crt
    #privateKeyPath: /usr/local/zeebe/certs/tls.key
    #keyStore:
    #  filePath: /usr/local/zeebe/jks/${UNAMESPACE}-zeebe.jks
    #  password: changeit
  #extraVolumeMounts:
    #- name: zeebe-jks
    #  mountPath: /usr/local/zeebe/jks
    #  readOnly: true  
  #  - name: zeebe-tls
  #    mountPath: /usr/local/zeebe/certs
  #    readOnly: true
  #extraVolumes:
    #- name: zeebe-jks
    #  secret:
    #    secretName: ${UNAMESPACE}-zeebe-jks
    # zeebe gateway to use full chain cert from the secret
  #  - name: zeebe-tls
  #    secret:
  #      secretName: ${UNAMESPACE}-zeebe-tls

zeebe:
  image:
    pullSecrets:
      - name: registry-docker-hub
  enabled: true
  prometheusServiceMonitor:
    enabled: true
  metrics:
    prometheus: /actuator/prometheus
  env:
    # ref -> https://docs.camunda.io/docs/self-managed/zeebe-deployment/configuration/broker-config/
    # section starts
  #  - name: ZEEBE_BROKER_NETWORK_SECURITY_ENABLED
  #    value: "false"
  #    # disable security for internal cluster communication
  #  - name: ZEEBE_BROKER_NETWORK_SECURITY_CERTIFICATECHAINPATH
  #    value: "/usr/local/zeebe/certs/tls.crt"
  #  - name: ZEEBE_BROKER_NETWORK_SECURITY_PRIVATEKEYPATH
  #    value: "/usr/local/zeebe/certs/tls.key"
  #  - name: ZEEBE_BROKER_CLUSTER_CLUSTERNAME
  #    value: "${UNAMESPACE}-zeebe"
  #  # section ends
  #  - name: KEYCLOAK_URL
  #    value: "https://${UNAMESPACE}.makelabs.in/auth"  
    - name: ZEEBE_BROKER_CLUSTER_RAFT_ENABLEPRIORITYELECTION
      value: "false"
    - name: ZEEBE_BROKER_CLUSTER_MEMBERSHIP_BROADCASTUPDATES
      value: "true"
    - name: ZEEBE_BROKER_EXECUTION_METRICS_EXPORTER_ENABLED
      value: "true"
    - name: ZEEBE_BROKER_EXPERIMENTAL_ROCKSDB_ENABLEACCESSMETRICS
      value: "fine"
  clusterSize: 3
  partitionCount: 5
  replicationFactor: 1
  pvcSize: 3Gi
  # refer to partitioning docs. https://docs.camunda.io/docs/self-managed/zeebe-deployment/configuration/fixed-partitioning/

  membership:
    configManager:
      gossip:
        syncDelay: 10s
        syncRequestTimeout: 5s
        gossipFanout: 2

  resources:
    requests:
      cpu: "100m"
      memory: "2Gi"
    limits:
      cpu: "200m"
      memory: "2Gi"
  #security:
  #  enabled: false # true to enable TLS
    #certChainPath: /usr/local/zeebe/certs/tls.crt
    #privateKeyPath: /usr/local/zeebe/certs/tls.key
    # Use only the cert in zeebe config. 
    #keyStore:
    #  filePath: /usr/local/zeebe/jks/${UNAMESPACE}-zeebe.jks
    #  password: changeit
  #extraVolumeMounts:
    #- name: zeebe-jks
    #  mountPath: /usr/local/zeebe/jks
    #  readOnly: true  
  #  - name: zeebe-tls
  #    mountPath: /usr/local/zeebe/certs
  #    readOnly: true
  #extraVolumes:
    #- name: zeebe-jks
    #  secret:
    #    secretName: ${UNAMESPACE}-zeebe-jks
    # zeebe to use full chain cert from the secret
  #  - name: zeebe-tls
  #    secret:
  #      secretName: ${UNAMESPACE}-zeebe-tls

  exporters:
    elasticsearch:
      className: io.camunda.zeebe.exporter.ElasticsearchExporter
      args:
        url: https://elasticsearch-master.${UNAMESPACE}.svc.cluster.local:9200
        bulk:
          delay: 5
          size: 1000
          memoryLimit: 10485760
        authentication:
          username: elastic
          password: makelabs
        index:
          prefix: zeebe-record
          createTemplate: true
          numberOfShards: 3
          numberOfReplicas: 0
        retention:
          enabled: true
          minimumAge: 10d
          policyName: zeebe-record-retention-policy

postgresql:
  image:
    pullSecrets:
      - name: registry-docker-hub


    - name: KEYCLOAK_URL
      value: "https://c8-labs-32.makelabs.in/auth"
  enabled: true
  image:
    pullSecrets:
      - name: registry-docker-hub
  contextPath: "/optimize"
#  ingress:
#    enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "1Gi"
    limits:
      cpu: "250m"
      memory: "1Gi"

tasklist:
  env:
    - name: KEYCLOAK_URL
      value: "https://c8-labs-32.makelabs.in/auth"
    - name: JAVA_TOOL_OPTIONS
      value: >
        -Djavax.net.ssl.trustStore=/app/certificates/externaldb.jks
        -Djavax.net.ssl.trustStorePassword=changeit
        -Djavax.net.ssl.trustStoreType=JKS
#  ingress:
#    enabled: true
  contextPath: "/tasklist"
  image:
    pullSecrets:
      - name: registry-docker-hub
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "750m"
      memory: "1Gi"
  extraVolumes:
    - name: tasklist-tls
      secret:
        secretName: cf-full-chain-origin-cert
  extraVolumeMounts:
    - name: tasklist-tls
      mountPath: /config/certs
      readOnly: true
  configuration: |
    server:
      servlet:
        contextPath: "/tasklist"
    management:
      server:
        base-path: "/tasklist"
    spring:
      profiles:
        active: identity-auth
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: "https://c8-labs-32-keycloak:443/auth/realms/camunda-platform"
              jwk-set-uri: "https://c8-labs-32.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/certs"

    camunda:
      identity:
        clientId: "tasklist"
        audience: "tasklist-api"

    zeebe.gateway.cluster:
      initialContactPoints: [c8-labs-32-zeebe-0.c8-labs-32-zeebe:26502,c8-labs-32-zeebe-1.c8-labs-32-zeebe:26502,c8-labs-32-zeebe-2.c8-labs-32-zeebe:26502]
      security:
        enabled: true
        certificateChainPath: "/config/certs/tls.crt"
        privateKeyPath: "/config/certs/tls.key"
      advertisedHost: tasklist
      memberId: tasklist

    # Camunda Database configuration
    camunda.database:
      type: elasticsearch
      # Cluster name
      clusterName: elasticsearch
      username: "elastic"
      # Elasticsearch full url
      url: "https://elasticsearch-master.c8-labs-32.svc.cluster.local:9200"

    # Tasklist configuration file
    camunda.tasklist:

      identity:
        redirectRootUrl: "https://c8-labs-32.makelabs.in"
        userAccessRestrictionsEnabled: true

      # Set Tasklist username and password.
      # If user with <username> does not exists it will be created.
      # Default: demo/demo
      #username:
      #password:
      # ELS instance to store Tasklist data
      elasticsearch:
        # Cluster name
        clusterName: elasticsearch
        # Host
        host: elasticsearch-master.c8-labs-32.svc.cluster.local
        # Transport port
        port: 9200
        # Elasticsearch full url
        url: "https://elasticsearch-master.c8-labs-32.svc.cluster.local:9200"
        username: "elastic"
        password: "makelabs"
      # ELS instance to export Zeebe data to
      zeebeElasticsearch:
        # Cluster name
        clusterName: elasticsearch
        # Host
        host: elasticsearch-master.c8-labs-32.svc.cluster.local
        # Transport port
        port: 9200
        # Index prefix, configured in Zeebe Elasticsearch exporter
        prefix: zeebe-record
        # Elasticsearch full url
        url: "https://elasticsearch-master.c8-labs-32.svc.cluster.local:9200"
        username: "elastic"
        password: "makelabs"
      # Zeebe instance
      zeebe:
        # Gateway address
        gatewayAddress: "c8-labs-32-zeebe-gw.makelabs.in:443"
        restAddress: "https://c8-labs-32.makelabs.in/zeebe"
        secure: true
        certificatePath: "/config/certs/tls.crt"
    #Spring Boot Actuator endpoints to be exposed
    management.endpoints.web.exposure.include: health,info,conditions,configprops,prometheus,loggers,usage-metrics,backups
    # Enable or disable metrics
    #management.metrics.export.prometheus.enabled: false


console:
  contextPath: "/console"
  enabled: true
  image:
    pullSecrets:
      - name: registry-camunda-cloud
  ingress:
    host: "c8-labs-32.makelabs.in"
    path: "/"
    pathType: Prefix
  env:
    - name: KEYCLOAK_URL
      value: "https://c8-labs-32.makelabs.in/auth"  
    - name: JAVA_TOOL_OPTIONS
      value: >
        -Djavax.net.ssl.trustStore=/config/jks/c8-labs-32-zeebe-toolkit.jks
        -Djavax.net.ssl.trustStorePassword=changeit
        -Djavax.net.ssl.trustStoreType=JKS
    - name: KEYCLOAK_BASE_URL
      value: "https://c8-labs-32.makelabs.in/auth"
    - name: KEYCLOAK_INTERNAL_BASE_URL
      value: "https://c8-labs-32.makelabs.in:443/auth"
    - name: CAMUNDA_CONSOLE_CONTEXT_PATH
      value: console
    - name: CAMUNDA_IDENTITY_CLIENT_ID
      value: console
    - name: CAMUNDA_IDENTITY_AUDIENCE
      value: console
    - name: CAMUNDA_CONSOLE_CUSTOMERID
      value: makelabs-in
    - name: CAMUNDA_CONSOLE_INSTALLATIONID
      value: makelabs-in-c8-labs-32-deployment
    - name: CAMUNDA_CONSOLE_TELEMETRY
      value: online
    - name: KEYCLOAK_REALM
      value: camunda-platform
    - name: SERVER_SSL_ENABLED
      value: "false"
    - name: SERVER_SSL_CERTIFICATE
      value: "file:/config/certs/cert-public-c8-labs.key"
    - name: SERVER_SSL_CERTIFICATE_PRIVATE_KEY
      value: "file:/config/certs/cert-key-c8-labs.key"
  tls:
    enabled: true
    existingSecret: console-certificates-tls-secret
    certKeyFilename: cert-public-c8-labs.key
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "2Gi"
  extraVolumeMounts:
    - name: console-certificates-tls
      mountPath: /config/certs
      readOnly: true
    - name: console-truststore
      mountPath: /config/jks
      readOnly: true
  extraVolumes:
    - name: console-certificates-tls
      secret:
        secretName: console-certificates-tls-secret
    - name: console-truststore
      secret:
        secretName: c8-labs-32-zeebe-toolkit-jks


connectors:
  image:
    pullSecrets:
      - name: registry-docker-hub
  contextPath: "/connectors"
  enabled: true
  ingress:
    host: "c8-labs-32.makelabs.in"
  replicas: 1
  metrics:
    prometheus: /actuator/prometheus
  resources:
    requests:
      cpu: "100m"
      memory: "512M"
    limits:
      cpu: "250m"
      memory: "1Gi"
  startupProbe:
    enabled: true
    probePath: /actuator/health/readiness
  readinessProbe:
    enabled: true
    probePath: /actuator/health/readiness

zeebeGateway:
  image:
    pullSecrets:
      - name: registry-docker-hub
  contextPath: "/zeebe"
  env:
    - name: ZEEBE_BROKER_GATEWAY_SECURITY_ENABLED
      value: "true"
    - name: ZEEBE_BROKER_GATEWAY_SECURITY_CERTIFICATECHAINPATH
      value: "/usr/local/zeebe/certs/tls.crt"
    - name: ZEEBE_BROKER_GATEWAY_SECURITY_PRIVATEKEYPATH
      value: "/usr/local/zeebe/certs/tls.key"
    #- name: ZEEBE_GATEWAY_SECURITY_AUTHENTICATION_MODE
    #  value: "none"
  ingress:
    grpc:
      enabled: true
      className: nginx
      host: "c8-labs-32-zeebe-gw.makelabs.in"
      tls:
        enabled: true
        secretName: cf-full-chain-origin-cert
    rest:
      enabled: true
      className: nginx
      host: "c8-labs-32.makelabs.in"
      path: "/zeebe"
      tls:
        enabled: true
        secretName: cf-full-chain-origin-cert
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "500m"
  security:
    enabled: true
    certChainPath: /usr/local/zeebe/certs/tls.crt
    privateKeyPath: /usr/local/zeebe/certs/tls.key
    #keyStore:
    #  filePath: /usr/local/zeebe/jks/c8-labs-32-zeebe.jks
    #  password: changeit
  extraVolumeMounts:
    #- name: zeebe-jks
    #  mountPath: /usr/local/zeebe/jks
    #  readOnly: true  
    - name: zeebe-tls
      mountPath: /usr/local/zeebe/certs
      readOnly: true
  extraVolumes:
    #- name: zeebe-jks
    #  secret:
    #    secretName: c8-labs-32-zeebe-jks
    # zeebe gateway to use full chain cert from the secret
    - name: zeebe-tls
      secret:
        secretName: cf-full-chain-origin-cert

zeebe:
  image:
    pullSecrets:
      - name: registry-docker-hub
  enabled: true
  prometheusServiceMonitor:
    enabled: true
  metrics:
    prometheus: /actuator/prometheus
  env:
    - name: KEYCLOAK_URL
      value: "https://c8-labs-32.makelabs.in/auth"  
    - name: ZEEBE_BROKER_CLUSTER_RAFT_ENABLEPRIORITYELECTION
      value: "false"
    - name: ZEEBE_BROKER_CLUSTER_MEMBERSHIP_BROADCASTUPDATES
      value: "true"
    - name: ZEEBE_BROKER_EXECUTION_METRICS_EXPORTER_ENABLED
      value: "true"
    - name: ZEEBE_BROKER_EXPERIMENTAL_ROCKSDB_ENABLEACCESSMETRICS
      value: "fine"
  clusterSize: 3
  partitionCount: 5
  replicationFactor: 1
  pvcSize: 3Gi
  # refer to partitioning docs. https://docs.camunda.io/docs/self-managed/zeebe-deployment/configuration/fixed-partitioning/

  membership:
    configManager:
      gossip:
        syncDelay: 10s
        syncRequestTimeout: 5s
        gossipFanout: 2

  resources:
    requests:
      cpu: "200m"
      memory: "2Gi"
    limits:
      cpu: "500m"
      memory: "2Gi"
  security:
    enabled: true
    certChainPath: /usr/local/zeebe/certs/tls.crt
    privateKeyPath: /usr/local/zeebe/certs/tls.key
    # Use only the cert in zeebe config. 
    #keyStore:
    #  filePath: /usr/local/zeebe/jks/c8-labs-32-zeebe.jks
    #  password: changeit
  extraVolumeMounts:
    #- name: zeebe-jks
    #  mountPath: /usr/local/zeebe/jks
    #  readOnly: true  
    - name: zeebe-tls
      mountPath: /usr/local/zeebe/certs
      readOnly: true
  extraVolumes:
    #- name: zeebe-jks
    #  secret:
    #    secretName: c8-labs-32-zeebe-jks
    # zeebe to use full chain cert from the secret
    - name: zeebe-tls
      secret:
        secretName: cf-full-chain-origin-cert

  exporters:
    elasticsearch:
      className: io.camunda.zeebe.exporter.ElasticsearchExporter
      args:
        url: https://elasticsearch-master.c8-labs-32.svc.cluster.local:9200
        bulk:
          delay: 5
          size: 1000
          memoryLimit: 10485760
        authentication:
          username: elastic
          password: makelabs
        index:
          prefix: zeebe-record
          createTemplate: true
          numberOfShards: 3
          numberOfReplicas: 0
        retention:
          enabled: true
          minimumAge: 10d
          policyName: zeebe-record-retention-policy

postgresql:
  image:
    pullSecrets:
      - name: registry-docker-hub

# lets use existing elk - we have it running already. check the config.

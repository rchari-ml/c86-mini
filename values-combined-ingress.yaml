global:
  ingress:
    enabled: false
    className: "nginx"
    host: "${UNAMESPACE}.makelabs.in"
    tls:
      enabled: true
      secretName: cf-full-chain-origin-cert
  identity:
    auth:
      publicIssuerUrl: "https://${UNAMESPACE}.makelabs.in/auth/realms/camunda-platform"
      # Added below for TLS config
      #adminUrl: "https://${UNAMESPACE}.makelabs.in/auth"
      #tokenUrl: "https://${UNAMESPACE}.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/token"
      #jwksUrl: "https://${UNAMESPACE}.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/certs"
      operate:
        redirectUrl: "https://${UNAMESPACE}.makelabs.in/operate"
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: operate-secret

      tasklist:
        redirectUrl: "https://${UNAMESPACE}.makelabs.in/tasklist"
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: tasklist-secret

      optimize:
        redirectUrl: "https://${UNAMESPACE}.makelabs.in/optimize"
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: optimize-secret
#     web modeler is not in use at the moment.
#      webModeler:
#        redirectUrl: "http://camunda.makelabs.in/webmodeler"
#        existingSecret:
#          name: identity-secret-for-components

      connectors:
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: connectors-secret

      console:
        redirectUrl: "https://${UNAMESPACE}.makelabs.in/console"
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: console-secret

      zeebe:
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: zeebe-secret

  elasticsearch:
    enabled: true
    external: true
    tls:
      enabled: true
      existingSecret: elastic-jks
    auth:
      username: elastic
      password: makelabs
    url:
      protocol: https
      host: elasticsearch-master.${UNAMESPACE}.svc.cluster.local
      port: 9200
    clusterName: elasticsearch
    prefix: zeebe-record


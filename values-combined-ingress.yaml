global:
  config:
    ## @param global.config.requestBodySize defines applications request body size which used for upload files.
    requestBodySize: 10MB
  multitenancy:
    ## @param global.multitenancy.enabled if true, then enable multitenancy in all applicable components.
    enabled: false
  host: "c86-mini.makelabs.in"
  orchestration:
    enabled: true
  security:
    authentication:
       method: "oidc"
  gateway:
    createGatewayResource: true
    enabled: true
  ingress:
    enabled: false
    className: "nginx"
    host: "c86-mini.makelabs.in"
    tls:
      enabled: true
      secretName: cf-full-chain-origin-cert
  # global.elasticsearch
  elasticsearch:
    enabled: true
    external: true
    tls:
      enabled: true
      secret:
        existingSecret: elastic-jks
    auth:
      username: elastic
      secret:
        inlineSecret: makelabs
    url:
      protocol: https
      host: elasticsearch-master.elastic.svc.cluster.local
      port: 9200
    clusterName: elasticsearch
    prefix: zeebe-record
  identity:
    keycloak:
      internal: true
      url:
        protocol: https # was http
        host: "c86-mini.makelabs.in" # was "c86-mini-keycloak"
        port: 443 # was "80"
      contextPath: "/auth"
      realm: "/realms/camunda-platform"
      extraVolumeMounts:
        - name: keycloak-jks-truststore
          mountPath: /etc/x509/https
          readOnly: true    
      extraVolumes:
        - name: keycloak-jks-truststore
          secret:
            secretName: camunda-elastic-jks # was  keycloak-jks-truststore-secret
      env:
        - name: IMPORTER_KEYCLOAK_SSL_VERIFY
          value: "false"    
        - name: KEYCLOAK_URL
          value: "https://c86-mini.makelabs.in/auth"
        - name: KEYCLOAK_PROXY_ADDRESS_FORWARDING
          value: "true"
        - name: KEYCLOAK_FRONTEND_URL
          value: "https://c86-mini.makelabs.in/auth"
        - name: KC_HTTP_ENABLED
          value: "false"
        - name: KEYCLOAK_PROXY
          value: "edge"
        - name: KEYCLOAK_HOSTNAME
          value: "c86-mini.makelabs.in"  
        - name: KC_HOSTNAME
          value: "c86-mini.makelabs.in"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_PROXY
          value: "edge"
        #- name: KC_HTTPS_CERTIFICATE_FILE
        #  value: /etc/x509/https/tls.crt
        #- name: KC_HTTPS_CERTIFICATE_KEY_FILE
        #  value: /etc/x509/https/tls.key
        #- name: KC_HTTPS_PORT
        #  value: "8443"
      auth:
        adminUser: admin
        secret:
          existingSecret: identity-secret-for-components
          existingSecretKey: admin-password
    auth:
      enabled: true
      type: "KEYCLOAK"
      issuerBackendUrl: "https://c86-mini.makelabs.in/auth/realms/camunda-platform"
      publicIssuerUrl:  "https://c86-mini.makelabs.in/auth/realms/camunda-platform"
      # Added below for TLS config
      adminUrl: "https://c86-mini.makelabs.in/auth"
      tokenUrl: "https://c86-mini.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/token"
      jwksUrl: "https://c86-mini.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/certs"
      operate:
        clientId: operate
        audience: operate-api
        redirectUrl: "https://c86-mini.makelabs.in/operate"
        secret:
          existingSecret: identity-secret-for-components
          existingSecretKey: operate-secret

      tasklist:
        clientId: tasklist
        audience: tasklist-api
        redirectUrl: "https://c86-mini.makelabs.in/tasklist"
        secret:
          existingSecret: identity-secret-for-components
          existingSecretKey: tasklist-secret

      optimize:
        clientId: optimize
        audience: optimize-api
        redirectUrl: "https://c86-mini.makelabs.in/optimize"
        secret:
          existingSecret: identity-secret-for-components
          existingSecretKey: optimize-secret
#     web modeler is not in use at the moment.
#      webModeler:
#        redirectUrl: "http://camunda.makelabs.in/webmodeler"
#        existingSecret:
#          name: identity-secret-for-components

      identity:
        clientId: camunda-identity
        audience: camunda-identity-resource-server
        # secret configuration does not need to be set when using Keycloak.
        # Marked for deletion by hjrc. TODO
        #secret:
        #  existingSecret: identity-secret-for-components
        #  existingSecretKey: identity-secret

      console:
        clientId: console
        audience: console-api
        redirectUrl: "https://c86-mini.makelabs.in/console"
        secret:
          existingSecret: identity-secret-for-components
          existingSecretKey: console-secret



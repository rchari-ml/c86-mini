## @section Identity - Keycloak Parameters
identityKeycloak:
  enabled: true
  #tls:
  #  enabled: true
  #  usePemCerts: true
  #  existingSecret: "keycloak-jks-truststore-secret"
  #  certFilename: "tls.crt"
  #  certKeyFilename: "tls.key"    
  #  keystoreFilename: "keycloak.keystore.jks"
  #  truststoreFilename: "keycloak.truststore.jks"
  #  keystorePassword: "changeit"
  #  truststorePassword: "changeit"
  nameOverride: "keycloak"
  image:
    pullSecrets:
      - name: registry-docker-hub
  extraVolumeMounts:
    - name: keycloak-jks-truststore
      mountPath: /etc/x509/https
      readOnly: true    
  extraVolumes:
    - name: keycloak-jks-truststore
      secret:
        secretName: keycloak-jks-truststore-secret
  auth:
    adminUser: admin
    existingSecret: identity-secret-for-components
    passwordSecretKey: admin-password
  postgresql:
    auth:
      existingSecret: identity-secret-for-components
      secretKeys:
        ## @param identityKeycloak.postgresql.auth.secretKeys.adminPasswordKey defines the key within the existing secret object for PostgreSQL admin.
        adminPasswordKey: "postgres-admin-password"
        ## @param identityKeycloak.postgresql.auth.secretKeys.userPasswordKey defines the key within the existing secret object for PostgreSQL user.
        userPasswordKey: "postgres-user-password"
    existingSecretKey: admin-password



global:
  ingress:
    enabled: true
    className: "nginx"
    host: "c8-labs-32.makelabs.in"
    tls:
      enabled: true
      secretName: cf-full-chain-origin-cert
  identity:
    auth:
      publicIssuerUrl: "https://c8-labs-32.makelabs.in/auth/realms/camunda-platform"
      adminUrl: "https://c8-labs-32.makelabs.in/auth"
      tokenUrl: "https://c8-labs-32.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/token"
      jwksUrl: "https://c8-labs-32.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/certs"
      operate:
        redirectUrl: "https://c8-labs-32.makelabs.in/operate"
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: operate-secret

      tasklist:
        redirectUrl: "https://c8-labs-32.makelabs.in/tasklist"
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: tasklist-secret

      optimize:
        redirectUrl: "https://c8-labs-32.makelabs.in/optimize"
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: optimize-secret
#     web modeler is not in use at the moment.
#      webModeler:
#        redirectUrl: "http://camunda.makelabs.in/webmodeler"
#        existingSecret:
#          name: identity-secret-for-components

      connectors:
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: connectors-secret

      console:
        redirectUrl: "https://c8-labs-32.makelabs.in/console"
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: console-secret

      zeebe:
        existingSecret:
          name: identity-secret-for-components
        existingSecretKey: zeebe-secret

  elasticsearch:
    enabled: true
    external: true
    tls:
      enabled: true
      existingSecret: elastic-jks
    auth:
      username: elastic
      password: makelabs
    url:
      protocol: https
      host: elasticsearch-master.c8-labs-32.svc.cluster.local
      port: 9200
    clusterName: elasticsearch
    prefix: zeebe-record

identity:
  env:
    - name: KEYCLOAK_URL
      value: "https://c8-labs-32.makelabs.in/auth"  
    - name: JAVA_TOOL_OPTIONS
      value: >
        -Djavax.net.ssl.trustStore=/config/jks/c8-labs-32-zeebe-toolkit.jks
        -Djavax.net.ssl.trustStorePassword=changeit
        -Djavax.net.ssl.trustStoreType=JKS  
    - name: KEYCLOAK_BASE_URL
      value: "https://c8-labs-32.makelabs.in/auth"
    - name: KEYCLOAK_INTERNAL_BASE_URL
      value: "https://c8-labs-32.makelabs.in:443/auth"
  image:
    pullSecrets:
      - name: registry-docker-hub
  contextPath: "/identity"
  fullURL: "https://c8-labs-32.makelabs.in/identity"
  firstUser:
    username: demo
    email: demo@makelabs.in
    #password: some-thing-very-secret
    existingSecret: identity-secret-for-components
    existingSecretKey: identity-firstuser-password
  extraVolumeMounts:
    - name: identity-truststore
      mountPath: /config/jks
      readOnly: true    
  extraVolumes:
    - name: identity-truststore
      secret:
        secretName: c8-labs-32-zeebe-toolkit-jks

  keycloak:
    extraEnvVars:
      - name: IMPORTER_KEYCLOAK_SSL_VERIFY
        value: "false"    
      - name: KEYCLOAK_URL
        value: "https://c8-labs-32.makelabs.in/auth"
      - name: KEYCLOAK_PROXY_ADDRESS_FORWARDING
        value: "true"
      - name: KEYCLOAK_FRONTEND_URL
        value: "https://c8-labs-32.makelabs.in/auth"
      - name: KC_HTTP_ENABLED
        value: "false"
      - name: KEYCLOAK_PROXY
        value: "edge"
      - name: KEYCLOAK_HOSTNAME
        value: "c8-labs-32.makelabs.in"  
      - name: KC_HOSTNAME
        value: "c8-labs-32.makelabs.in"
      - name: KC_HOSTNAME_STRICT
        value: "false"
      - name: KC_PROXY
        value: "edge"
      - name: KC_HTTPS_CERTIFICATE_FILE
        value: /etc/x509/https/tls.crt
      - name: KC_HTTPS_CERTIFICATE_KEY_FILE
        value: /etc/x509/https/tls.key
      - name: KC_HTTPS_PORT
        value: "8443"

identityKeycloak:
  tls:
    enabled: true
    usePemCerts: true
    existingSecret: "keycloak-jks-truststore-secret"
    certFilename: "tls.crt"
    certKeyFilename: "tls.key"    
    keystoreFilename: "keycloak.keystore.jks"
    truststoreFilename: "keycloak.truststore.jks"
    keystorePassword: "changeit"
    truststorePassword: "changeit"
  image:
    pullSecrets:
      - name: registry-docker-hub
  extraVolumeMounts:
    - name: keycloak-jks-truststore
      mountPath: /etc/x509/https
      readOnly: true    
  extraVolumes:
    - name: keycloak-jks-truststore
      secret:
        secretName: keycloak-jks-truststore-secret
  auth:
    existingSecret: identity-secret-for-components
    passwordSecretKey: admin-password
  postgresql:
    auth:
      existingSecret: identity-secret-for-components
    existingSecretKey: admin-password

operate:
  env:
    - name: KEYCLOAK_URL
      value: "https://c8-labs-32.makelabs.in/auth"
    - name: CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS
      value: "c8-labs-32-zeebe-gw.makelabs.in:443"
    - name: CAMUNDA_OPERATE_ZEEBE_SECURE
      value: "true"
    # link the value from secret cf-full-chain-origin-cert
    - name: CAMUNDA_OPERATE_ZEEBE_SECURITY_CERTCHAINPATH
      value: "/app/certs/tls.crt"
    - name: JAVA_TOOL_OPTIONS
      value: >
        -Djavax.net.ssl.trustStore=/app/certificates/externaldb.jks
        -Djavax.net.ssl.trustStorePassword=changeit
        -Djavax.net.ssl.trustStoreType=JKS
  extraVolumeMounts:
    - name: operate-tls
      mountPath: /app/certs
      readOnly: true
  extraVolumes:
    - name: operate-tls
      secret:
        secretName: cf-full-chain-origin-cert
  image:
    pullSecrets:
      - name: registry-docker-hub
#  ingress:
#    enabled: true
  contextPath: "/operate"
  resources:
    requests:
      cpu: "100m"
      memory: "512M"
    limits:
      cpu: "250m"
      memory: "1Gi"
  configuration: |
    server:
      servlet:
        context-path: "/operate"
    management:
      server:
        base-path: "/operate"
    spring:
      profiles:
        active: "identity-auth"
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: "https://c8-labs-32-keycloak:443/auth/realms/camunda-platform"
              jwk-set-uri: "https://c8-labs-32.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/certs"

    camunda:
      identity:
        clientId: "operate"
        audience: "operate-api"

    zeebe.gateway.cluster:
      initialContactPoints: [c8-labs-32-zeebe-0.c8-labs-32-zeebe:26502,c8-labs-32-zeebe-1.c8-labs-32-zeebe:26502,c8-labs-32-zeebe-2.c8-labs-32-zeebe:26502]
      security:
        enabled: true
        certificateChainPath: "/app/certs/tls.crt"
        privateKeyPath: "/app/certs/tls.key"
      advertisedHost: operate
      memberId: operate        

    # Camunda Database configuration
    camunda.database:
      type: elasticsearch
      # Cluster name
      clusterName: elasticsearch
      username: "elastic"
      password: "makelabs"
      # Elasticsearch full url
      url: "https://elasticsearch-master.c8-labs-32.svc.cluster.local:9200"

    # Operate configuration file
    camunda.operate:
      identity:
        redirectRootUrl: "https://c8-labs-32.makelabs.in"

      # ELS instance to store Operate data
      elasticsearch:
        # Cluster name
        clusterName: elasticsearch
        username: "elastic"
        password: "makelabs"
        # Host
        host: elasticsearch-master.c8-labs-32.svc.cluster.local
        # Transport port
        port: 9200
        # Elasticsearch full url
        url: "https://elasticsearch-master.c8-labs-32.svc.cluster.local:9200"
      # ELS instance to export Zeebe data to
      zeebeElasticsearch:
        # Cluster name
        clusterName: elasticsearch
        # Host
        host: elasticsearch-master.c8-labs-32.svc.cluster.local
        # Transport port
        port: 9200
        # Index prefix, configured in Zeebe Elasticsearch exporter
        prefix: zeebe-record
        # Elasticsearch full url
        url: "https://elasticsearch-master.c8-labs-32.svc.cluster.local:9200"
        # Elasticsearch username
        username: "elastic"
        password: "makelabs"
      # Zeebe instance
      zeebe:
        # Gateway address
        gatewayAddress: "c8-labs-32-zeebe-gw.makelabs.in:443"
        secure: true
        certificatePath: "/app/certs/tls.crt"
    logging:
      level:
        ROOT: INFO
        io.camunda.operate: INFO
    #Spring Boot Actuator endpoints to be exposed
    management.endpoints.web.exposure.include: health,info,conditions,configprops,prometheus,loggers,usage-metrics,backups  



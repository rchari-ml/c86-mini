spring:
  application:
    name: tasklist-toolkit

server:
  port: 9010

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Below is oauth config for self managed
camunda:
  client:
    mode: self-managed
    auth:
      client-id: zeebe
      client-secret: ${ZEEBE_TOKEN_SECRET}
      token-url: https://${UNAMESPACE}.makelabs.in/auth/realms/camunda-platform/protocol/openid-connect/token
    zeebe:
      enabled: true
      grpc-address: http://${UNAMESPACE}-zeebe-gateway:26500
      prefer-rest-over-grpc: false
      audience: zeebe
      # using TLS JKS in the deploymenet - see deploy-worker-toolkit yaml file
      security:
        plaintext: true

logging:
  level:
    root: INFO
    io.camunda: INFO
    io.grpc: INFO

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-static-web-app
  namespace: c8-labs-32
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-static-web-app
  template:
    metadata:
      labels:
        app: nginx-static-web-app
    spec:
      containers:
      - name: nginx-static-web-app
        image: asia-south2-docker.pkg.dev/c8-labs/c8-labs-repo/toolkit-c8-labs-nginx-static:v1
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /index.html
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-landing-page-service
  namespace: c8-labs-32
spec:
  selector:
    app: nginx-static-web-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

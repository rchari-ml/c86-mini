apiVersion: apps/v1
kind: Deployment
metadata:
  name: toolkit-app
  namespace: ${UNAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: toolkit-app
  template:
    metadata:
      labels:
        app: toolkit-app
    spec:
      containers:
      - name: toolkit-app
        image: asia-south2-docker.pkg.dev/c8-labs/c8-labs-repo/toolkit-${UNAMESPACE}:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 9010
        volumeMounts:
          - name: zeebe-toolkit-crt
            mountPath: /app/certs
            readOnly: true
        env:
          - name: JAVA_TOOL_OPTIONS
            value: >
              -Djavax.net.ssl.trustStore=/app/certs/${UNAMESPACE}-zeebe-toolkit.jks
              -Djavax.net.ssl.trustStorePassword=changeit
              -Djavax.net.ssl.trustStoreType=JKS
          - name: UNAMESPACE
            value: ${UNAMESPACE}
          - name: TASKLIST_API_TOKEN_SECRET
            valueFrom:
              secretKeyRef:
                name: identity-secret-for-components
                key: tasklist-api-secret
          - name: ZEEBE_TOKEN_SECRET
            valueFrom:
              secretKeyRef:
                name: identity-secret-for-components
                key: zeebe-secret
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 9010
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
        - name: zeebe-toolkit-crt
          secret:
            secretName: "${UNAMESPACE}-zeebe-toolkit-jks"
---
apiVersion: v1
kind: Service
metadata:
  name: toolkit-service
  namespace: ${UNAMESPACE}
spec:
  selector:
    app: toolkit-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 9010

# adds additional scrape configs to prometheus.yml
# must be a string so you have to add a | after extraScrapeConfigs:

extraScrapeConfigs: |
   - job_name: 'zeebe-gateway'
     scrape_interval: 15s
     metrics_path: /zeebe/actuator/prometheus
     scheme: http
     tls_config:
       insecure_skip_verify: true
     static_configs:
     - targets:
         - '${UNAMESPACE}-zeebe-gateway.${UNAMESPACE}.svc.cluster.local:9600'
   - job_name: 'zeebe'
     scrape_interval: 15s
     metrics_path: /actuator/prometheus
     scheme: http
     tls_config:
       insecure_skip_verify: true
     static_configs:
     - targets:
         - '${UNAMESPACE}-zeebe-0.${UNAMESPACE}-zeebe:9600'
         - '${UNAMESPACE}-zeebe-1.${UNAMESPACE}-zeebe:9600'
         - '${UNAMESPACE}-zeebe-2.${UNAMESPACE}-zeebe:9600'

# adds additional scrape configs to prometheus.yml
# must be a string so you have to add a | after extraScrapeConfigs:

extraScrapeConfigs: |
   - job_name: 'zeebe-gateway'
     scrape_interval: 15s
     metrics_path: /zeebe/actuator/prometheus
     scheme: http
     tls_config:
       insecure_skip_verify: true
     static_configs:
     - targets:
         - 'c8-labs-32-zeebe-gateway.c8-labs-32.svc.cluster.local:9600'
   - job_name: 'zeebe'
     scrape_interval: 15s
     metrics_path: /actuator/prometheus
     scheme: http
     tls_config:
       insecure_skip_verify: true
     static_configs:
     - targets:
         - 'c8-labs-32-zeebe-0.c8-labs-32-zeebe:9600'
         - 'c8-labs-32-zeebe-1.c8-labs-32-zeebe:9600'
         - 'c8-labs-32-zeebe-2.c8-labs-32-zeebe:9600'

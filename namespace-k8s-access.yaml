apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-shared-secrets
  namespace: c8-labs-ingress-nginx
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: public-secret-reader
  namespace: c8-labs-ingress-nginx
subjects:
- kind: Group
  name: system:authenticated
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: read-shared-secrets
  apiGroup: rbac.authorization.k8s.io

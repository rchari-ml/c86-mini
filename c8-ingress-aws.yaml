apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${UNAMESPACE}-ingress
  namespace: ${UNAMESPACE}
  labels:
    app: camunda-platform
    app.kubernetes.io/instance: ${UNAMESPACE}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/part-of: camunda-platform
    helm.sh/chart: camunda-platform-12.0.0-alpha4
  annotations:
    kubernetes.io/ingress.class: "nginx"
    meta.helm.sh/release-name: ${UNAMESPACE}
    meta.helm.sh/release-namespace: ${UNAMESPACE}

    # Force HTTPS only on the ingress
    kubernetes.io/ingress.allow-http: "false"

    # NGINX backend protocol
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

    # Correct NGINX regex configuration for connectors
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: "nginx"

  tls:
    - hosts:
        - ${UNAMESPACE}.makelabs.in
      secretName: cf-origin-cert

  rules:
    - host: ${UNAMESPACE}.makelabs.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-landing-page-service
                port:
                  number: 80

          - path: /console
            pathType: Prefix
            backend:
              service:
                name: ${UNAMESPACE}-console
                port:
                  number: 80

          - path: /operate
            pathType: Prefix
            backend:
              service:
                name: ${UNAMESPACE}-operate
                port:
                  number: 80

          - path: /tasklist
            pathType: Prefix
            backend:
              service:
                name: ${UNAMESPACE}-tasklist
                port:
                  number: 80

          - path: /optimize
            pathType: Prefix
            backend:
              service:
                name: ${UNAMESPACE}-optimize
                port:
                  number: 80

          - path: /identity
            pathType: Prefix
            backend:
              service:
                name: ${UNAMESPACE}-identity
                port:
                  number: 80

          # Regex-style for connectors (NGINX version — AWS compatible)
          - path: /connectors(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ${UNAMESPACE}-connectors
                port:
                  number: 8080

          - path: /zeebe
            pathType: Prefix
            backend:
              service:
                name: ${UNAMESPACE}-zeebe-gateway
                port:
                  number: 8080

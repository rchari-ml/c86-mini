#---
# zeebe gateway readiness > http://${UNAMESPACE}-zeebe-gateway.${UNAMESPACE}:9600/zeebe/actuator/health/readiness
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: zee-gateway-backendconfig
  namespace: ${UNAMESPACE}
spec:
  healthCheck:
    requestPath: /zeebe/actuator/health/readiness
    port: 9600
---
apiVersion: v1
kind: Service
metadata:
  name: ${UNAMESPACE}-zeebe-gateway
  namespace: ${UNAMESPACE}
  annotations:
    cloud.google.com/backend-config: '{"default": "zee-gateway-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9600
      targetPort: 9600
    - name: grpc
      protocol: TCP
      port: 26500
      targetPort: 26500
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${UNAMESPACE}-zeebe-gateway-grpc
  namespace: ${UNAMESPACE}
  labels:
    app: camunda-platform
    app.kubernetes.io/instance: ${UNAMESPACE}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/part-of: camunda-platform
    helm.sh/chart: camunda-platform-12.0.0-alpha4      
  annotations:
    kubernetes.io/ingress.class: "nginx"
    meta.helm.sh/release-namespace: ${UNAMESPACE}
    kubernetes.io/ingress.allow-http: "false"  # on ingress, we only allow secure line. 
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    #nginx.ingress.kubernetes.io/ssl-passthrough: "true" # enable for GRPCS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    #networking.gke.io/managed-certificates: c8-zeebe-gw-cert # In case GKE managed cert
spec:
  tls:
    - hosts:
        - ${UNAMESPACE}-zeebe-gateway.makelabs.in
      secretName: cf-full-chain-origin-cert # cf-origin-cert
  ingressClassName: "nginx"
  rules:
    - host: ${UNAMESPACE}-zeebe-gateway.makelabs.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${UNAMESPACE}-zeebe-gateway
                port:
                  number: 26500

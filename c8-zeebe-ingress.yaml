# zeebe gateway readiness > http://c8-labs-31-zeebe-gateway.c8-labs-31:9600/zeebe/actuator/health/readiness
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: zee-gateway-backendconfig
  namespace: c8-labs-31
spec:
  healthCheck:
    requestPath: /zeebe/actuator/health/readiness
    port: 9600
---
apiVersion: v1
kind: Service
metadata:
  name: c8-labs-31-zeebe-gateway
  namespace: c8-labs-31
  annotations:
    cloud.google.com/backend-config: '{"default": "zee-gateway-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9600
      targetPort: 9600
    - name: grpc
      protocol: TCP
      port: 26500      
      targetPort: 26500
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: c8-labs-31-zeebe-gateway-grpc
  namespace: c8-labs-31
  labels:
    app: camunda-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    meta.helm.sh/release-namespace: c8-labs-31
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: zeebe-c8-labs-31.makelabs.in
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: c8-labs-31-zeebe-gateway
                port:
                  number: 26500
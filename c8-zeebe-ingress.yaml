#apiVersion: networking.gke.io/v1
#kind: ManagedCertificate
#metadata:
#  name: c8-zeebe-gw-cert
#  namespace: c8-labs-32
#spec:
#  domains:
#    - c8-labs-32-zeebe-gw.makelabs.in
#---
# zeebe gateway readiness > http://c8-labs-32-zeebe-gateway.c8-labs-32:9600/zeebe/actuator/health/readiness
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: zee-gateway-backendconfig
  namespace: c8-labs-32
spec:
  healthCheck:
    requestPath: /zeebe/actuator/health/readiness
    port: 9600
---
apiVersion: v1
kind: Service
metadata:
  name: c8-labs-32-zeebe-gateway
  namespace: c8-labs-32
  annotations:
    cloud.google.com/backend-config: '{"default": "zee-gateway-backendconfig"}'
spec:
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9600
      targetPort: 9600
    - name: grpc
      protocol: TCP
      port: 26500
      targetPort: 26500
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: c8-labs-32-zeebe-gateway-grpc
  namespace: c8-labs-32
  labels:
    app: camunda-platform
    app.kubernetes.io/instance: c8-labs-32
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/part-of: camunda-platform
    helm.sh/chart: camunda-platform-12.0.0-alpha4      
  annotations:
    kubernetes.io/ingress.class: "nginx"
    meta.helm.sh/release-namespace: c8-labs-32
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    kubernetes.io/ingress.allow-http: "false"  # on ingress, we only allow secure line. 
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    #networking.gke.io/managed-certificates: c8-zeebe-gw-cert # Demo env does not require cert
spec:
  tls:
    - hosts:
        - c8-labs-32-zeebe-gw.makelabs.in
      secretName: cf-origin-cert
  ingressClassName: "nginx"
  rules:
    - host: c8-labs-32-zeebe-gw.makelabs.in
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: c8-labs-32-zeebe-gateway
                port:
                  number: 26500

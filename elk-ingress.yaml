apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: elk-managed-cert
  namespace: ${UNAMESPACE}
spec:
  domains:
    - elk-${UNAMESPACE}.makelabs.in
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elk-ingress
  namespace: ${UNAMESPACE}
  annotations:
    kubernetes.io/ingress.class: "nginx"
    #networking.gke.io/ssl-services: "elasticsearch-master" # pass through the SSL certificate
    networking.gke.io/managed-certificates: elk-managed-cert
    networking.gke.io/backend-protocol: "HTTP"  # Tell GKE to use HTTP to backend
    cloud.google.com/healthcheck-path: "/login"
spec:
  defaultBackend:
    service:
      name: kibana-kibana
      port:
        number: 5601

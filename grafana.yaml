apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ${UNAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:      
        - name: grafana
          image: grafana/grafana:12.0.2
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          env:
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://${UNAMESPACE}.makelabs.in/grafana"

            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"

            - name: GF_INSTALL_PLUGINS
              value: ""

            - name: GF_SECURITY_ADMIN_USER
              value: admin

            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-secret-for-components
                  key: grafana-admin-secret

            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ${UNAMESPACE}
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: ${UNAMESPACE}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true